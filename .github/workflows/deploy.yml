name: Deploy to GCS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Remove old files from GCS
        run: |
          gsutil -m rm -r gs://www.japantech.com.br/assets/ || true
          gsutil rm gs://www.japantech.com.br/index.html || true

      - name: Deploy to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist
          destination: www.japantech.com.br
          parent: false
          predefined_acl: publicRead