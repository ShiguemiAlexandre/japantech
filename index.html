
<!DOCTYPE html>
<html lang="pt-BR" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japantech | Tecnologia que Escala</title>
    <link rel="icon" type="image/png" href="https://storage.googleapis.com/www.japantech.com.br/public/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="https://storage.googleapis.com/www.japantech.com.br/public/favicon-16x16.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- Scrollbar Styling --- */
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #dc2626 #000000;
        }

        /* Chrome, Edge, and Safari */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border: 2px solid #000000;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #dc2626;
        }

        /* Para mobile, manter a barra discreta mas temática */
        @media (max-width: 768px) {
            ::-webkit-scrollbar {
                width: 4px;
            }
            ::-webkit-scrollbar-thumb {
                background: #dc2626;
            }
        }
        /* --- End Scrollbar Styling --- */

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .font-jp {
            font-family: 'Noto Serif JP', serif;
        }
        
        /* Noise Overlay */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
            filter: contrast(150%) brightness(100%);
        }
        
        /* Scanline Effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(220, 38, 38, 0.1);
            position: fixed;
            z-index: 9998;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .bg-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(220, 38, 38, 0.07) 1px, transparent 0);
            background-size: 50px 50px;
        }

        @keyframes float-status {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float-status {
            animation: float-status 4s ease-in-out infinite;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* Smooth reveal for sections */
        section {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="scanline"></div>
    <div id="root"></div>

    <script>
        // Simple Intersection Observer for section reveals
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        window.addEventListener('load', () => {
            document.querySelectorAll('section').forEach(s => sectionObserver.observe(s));
        });
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
